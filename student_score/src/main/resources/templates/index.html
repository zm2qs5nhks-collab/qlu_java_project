<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>首页 - 学生成绩管理系统</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 30px; }
        h2 { color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        .nav-section { margin: 15px 0; }
        .nav-section h4 { color: #555; margin: 10px 0 5px 0; }
        .nav-section a {
            display: inline-block; margin: 3px 8px; padding: 8px 16px;
            background: #f5f5f5; border-radius: 4px; text-decoration: none;
            color: #333; border: 1px solid #ddd;
        }
        .nav-section a:hover { background: #e8f5e9; border-color: #4CAF50; }
        .nav-section a.primary { background: #4CAF50; color: white; border-color: #388E3C; }
        .nav-section a.warning { background: #FF9800; color: white; border-color: #F57C00; }
        .nav-section a.danger { background: #f44336; color: white; border-color: #d32f2f; }
    </style>
</head>
<body>
<h2>🎓 学生成绩管理系统</h2>
<p>欢迎，<b th:text="${session.user?.username}"></b>！</p>

<div class="nav-section">
    <h4>📋 基础数据管理</h4>
    <a href="/class/list">🏫 班级管理</a>
    <a href="/student/list">👨‍🎓 学生管理</a>
    <a href="/course/list">📚 课程管理</a>
</div>

<div class="nav-section">
    <h4>📝 成绩管理</h4>
    <a href="/score/list" class="primary">📋 成绩列表</a>
    <a href="/score/toAddBatch" class="primary">✏️ 批量录入成绩</a>
    <a href="/score/export">📥 导出原始成绩Excel</a>
</div>

<div class="nav-section">
    <h4>📊 统计与报表</h4>
    <a href="/score/distribution">📊 成绩分布图</a>
    <a href="/score/report" class="primary">📈 学习情况报表</a>
    <a href="/score/report/exportTxt">📄 导出报表TXT</a>
    <a href="/score/report/exportExcel">📊 导出报表Excel（POI加分项）</a>
</div>

<div class="nav-section">
    <h4>🧪 测试工具</h4>
    <a href="/test/generate" class="warning">🔧 生成10万测试数据</a>
</div>

<div class="nav-section" style="margin-top:25px;">
    <a href="/logout" class="danger">🚪 退出登录</a>
</div>
</body>
</html>
